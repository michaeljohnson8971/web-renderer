<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- GitHub Pages SPA redirect handler -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    
    <!-- Primary Meta Tags -->
    <title>DABL Studio | Economic Development Strategy & Consulting</title>
    <meta name="description" content="DABL Studio is an economic development consultancy working with cities, nonprofits, and institutions to design initiatives that expand opportunity and strengthen neighborhood economies." />
    <meta name="author" content="DABL Studio" />
    <meta name="keywords" content="Chicago policy research, urban planning, corridor planning, community wealth building, racial equality, equity, reparations, environmental planning, energy policy, renewables, municipal bonds, economic development, community investment, small business ecosystems, neighborhood economies, consulting, strategy, research, equitable development Chicago, community land trust, inclusive zoning, transit-oriented development, Black economic empowerment, environmental justice, green infrastructure, climate resilience planning, public finance, tax increment financing, community benefit agreements, participatory budgeting, workforce development, anchor institution strategy, social impact investing, just transition" />

    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <meta name="GPTBot" content="noindex, nofollow" />
