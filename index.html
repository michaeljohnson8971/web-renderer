<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- GitHub Pages SPA redirect handler -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    
    <!-- Primary Meta Tags -->
    <title>DABL Studio | Economic Development Strategy & Consulting</title>
    <meta name="description" content="DABL Studio is an economic development consultancy working with cities, nonprofits, and institutions to design initiatives that expand opportunity and strengthen neighborhood economies." />
    <meta name="author" content="DABL Studio" />
    <meta name="keywords" content="economic development, community investment, small business, urban planning, neighborhood economies, consulting, strategy, research, policy" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dablstudio.com/" />
    <meta property="og:title" content="DABL Studio | Economic Development Strategy & Consulting" />
    <meta property="og:description" content="Economic development consultancy working with cities, nonprofits, and institutions to design initiatives that expand opportunity and strengthen neighborhood economies." />
    <meta property="og:image" content="https://dablstudio.com/og-image.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://dablstudio.com/" />
    <meta name="twitter:title" content="DABL Studio | Economic Development Strategy & Consulting" />
    <meta name="twitter:description" content="Economic development consultancy working with cities, nonprofits, and institutions to design initiatives that expand opportunity and strengthen neighborhood economies." />
    <meta name="twitter:image" content="https://dablstudio.com/og-image.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://dablstudio.com/" />
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
